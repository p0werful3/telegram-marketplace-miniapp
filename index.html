<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Marketplace</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    padding:40px;
}

h1{
    font-size:28px;
}

button{
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
    margin-top:20px;
}
</style>

</head>

<body>

<h1>🛍 Marketplace</h1>

<p>Добро пожаловать в магазин</p>

<button onclick="buy()">Купить товар</button>

<script>

let tg = window.Telegram.WebApp;
tg.expand();

function buy(){
    alert("Товар добавлен в корзину");
}

</script>

</body>
</html>
