<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Marketplace</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css?v=110">
</head>
<body>
    <div id="auth-screen" class="auth-screen">
        <div class="auth-card">
            <h1>🛍 Telegram Marketplace</h1>
            <p class="subtitle">Увійдіть або зареєструйтеся</p>

            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchAuthTab('login', this)">Вхід</button>
                <button class="auth-tab" onclick="switchAuthTab('register', this)">Реєстрація</button>
            </div>

            <div id="auth-login" class="auth-panel active">
                <input id="login-username" type="text" placeholder="Username">
                <input id="login-password" type="password" placeholder="Password">
                <button class="primary-btn" onclick="loginUser()">Увійти</button>
            </div>

            <div id="auth-register" class="auth-panel">
                <input id="register-username" type="text" placeholder="Username">
                <input id="register-fullname" type="text" placeholder="Ім'я">
                <input id="register-password" type="password" placeholder="Password">
                <button class="primary-btn" onclick="registerNewUser()">Зареєструватися</button>
            </div>

            <div class="divider">або</div>

            <button id="tg-login-btn" class="secondary-btn full-btn" onclick="loginWithTelegram()">Увійти через Telegram</button>

            <label class="remember-me">
                <input id="remember-me" type="checkbox">
                Запам’ятати акаунт
            </label>
        </div>
    </div>

    <div id="app-screen" class="app hidden">
        <header class="topbar">
            <h1>🛍 Telegram Marketplace</h1>
            <p class="subtitle">Інтегрований торговельний майданчик</p>
        </header>

        <main class="content">
            <section id="tab-catalog" class="tab-section active">
                <div class="section-header">
                    <h2>Каталог товарів</h2>
                    <button class="secondary-btn section-btn" onclick="loadProducts()">Оновити</button>
                </div>

                <div class="search-bar">
                    <input id="search-input" type="text" placeholder="Пошук товарів...">
                    <select id="category-filter" onchange="loadProducts()">
                        <option value="Усі">Усі</option>
                        <option value="Смартфони">Смартфони</option>
                        <option value="Ноутбуки">Ноутбуки</option>
                        <option value="Навушники">Навушники</option>
                        <option value="Ігрові приставки">Ігрові приставки</option>
                        <option value="Планшети">Планшети</option>
                        <option value="Аксесуари">Аксесуари</option>
                        <option value="Інше">Інше</option>
                    </select>
                    <button class="secondary-btn section-btn" onclick="loadProducts()">Шукати</button>
                </div>

                <div id="products-list" class="cards cards-grid"></div>
            </section>

            <section id="tab-my-products" class="tab-section">
                <div class="section-header">
                    <h2>Мої оголошення</h2>
                    <button class="secondary-btn section-btn" onclick="loadMyProducts()">Оновити</button>
                </div>

                <div class="subtabs">
                    <button id="my-products-active-btn" class="subtab-btn active" onclick="switchMyProductsView('active')">Активні</button>
                    <button id="my-products-history-btn" class="subtab-btn" onclick="switchMyProductsView('history')">Історія</button>
                </div>

                <div id="my-products-list" class="cards"></div>
            </section>

            <section id="tab-create" class="tab-section">
                <h2>Створити оголошення</h2>

                <div class="form-card">
                    <label>Назва товару</label>
                    <input id="product-title" type="text" placeholder="Наприклад: iPhone 15">

                    <label>Опис</label>
                    <textarea id="product-description" placeholder="Опишіть товар"></textarea>

                    <label>Ціна</label>
                    <input id="product-price" type="number" placeholder="1000">

                    <label>Категорія</label>
                    <select id="product-category">
                        <option value="">Оберіть категорію</option>
                        <option value="Смартфони">Смартфони</option>
                        <option value="Ноутбуки">Ноутбуки</option>
                        <option value="Навушники">Навушники</option>
                        <option value="Ігрові приставки">Ігрові приставки</option>
                        <option value="Планшети">Планшети</option>
                        <option value="Аксесуари">Аксесуари</option>
                        <option value="Інше">Інше</option>
                    </select>

                    <label>Стан товару</label>
                    <select id="product-condition">
                        <option value="">Оберіть стан</option>
                        <option value="Новий">Новий</option>
                        <option value="Б/У">Б/У</option>
                    </select>

                    <label>Фото товару</label>
                    <input id="product-file" type="file" accept="image/*" onchange="handleImagePreview(event)">

                    <div id="image-preview-wrap" class="hidden image-preview-wrap">
                        <img id="image-preview" class="image-preview">
                    </div>

                    <p id="image-status" class="image-status">Фото не вибрано</p>

                    <button class="primary-btn" onclick="createProduct()">Створити оголошення</button>
                </div>
            </section>

            <section id="tab-cart" class="tab-section">
                <div class="section-header">
                    <h2>Кошик</h2>
                    <button class="secondary-btn section-btn" onclick="loadCart()">Оновити</button>
                </div>

                <div id="cart-list" class="cards"></div>

                <div class="cart-total-card">
                    <p id="cart-total">Разом: 0$</p>
                </div>
            </section>

            <section id="tab-profile" class="tab-section">
                <h2>Профіль</h2>

                <div class="profile-card">
                    <p><strong>ID:</strong> <span id="profile-id">—</span></p>
                    <p><strong>Telegram ID:</strong> <span id="profile-telegram-id">—</span></p>
                    <p><strong>Username:</strong> <span id="profile-username">—</span></p>
                    <p><strong>Ім'я:</strong> <span id="profile-fullname">—</span></p>
                    <button class="primary-btn" onclick="logout()">Змінити акаунт / Вийти</button>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn active" data-tab="catalog" onclick="switchTab('catalog', this)">
                <span class="nav-label">Каталог</span>
            </button>

            <button class="nav-btn" data-tab="my-products" onclick="switchTab('my-products', this)">
                <span class="nav-label">Мої</span>
            </button>

            <button class="nav-btn nav-create" data-tab="create" onclick="switchTab('create', this)">
                <span class="nav-plus">+</span>
            </button>

            <button class="nav-btn" data-tab="cart" onclick="switchTab('cart', this)">
                <span class="nav-label">Кошик</span>
            </button>

            <button class="nav-btn" data-tab="profile" onclick="switchTab('profile', this)">
                <span class="nav-label">Профіль</span>
            </button>
        </nav>
    </div>

    <div id="product-modal" class="modal hidden" onclick="closeProductModalOnBackdrop(event)">
        <div class="modal-content">
            <button class="modal-close" onclick="closeProductModal()">×</button>
            <div id="product-modal-body"></div>
        </div>
    </div>

    <script src="app.js?v=110"></script>
</body>
</html>
